
<style>

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.chapter-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:var(--color-background-info);color:var(--color-text-info)}
.progress-bar{height:4px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:1.5rem;overflow:hidden}

.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.75rem;text-align:center}

.stat-val{font-size:22px;font-weight:500}
.q-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.q-meta{font-size:12px;color:var(--color-text-secondary);margin-bottom:.75rem}
.q-text{font-size:15px;line-height:1.7;margin-bottom:1rem}
.options{display:flex;flex-direction:column;gap:8px}
.opt-btn{text-align:left;padding:.75rem 1rem;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-size:14px;line-height:1.5;color:var(--color-text-primary);transition:background .15s,border-color .15s}
.opt-btn:hover:not(:disabled){background:var(--color-background-secondary);border-color:var(--color-border-primary)}
.opt-btn.correct{background:#EAF3DE;border-color:#639922;color:#27500A}

.nav{display:flex;gap:8px;margin-top:1rem;align-items:center;justify-content:space-between}

.result-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1.5rem}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.filter-btn{padding:4px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-size:12px;color:var(--color-text-secondary)}
.filter-btn.active{background:#E6F1FB;border-color:#185FA5;color:#185FA5;font-weight:500}

<div class="quiz-wrap">
  <h2 class="sr-only">電気電子工学Ⅱ 前期総合クイズ</h2>
  <div id="app"></div>
</div>

<script>
const ALL_QUESTIONS = [
  {ch:1,label:"第1章 電気回路",q:"キルヒホッフの電流則（KCL）の説明として正しいのはどれか？",opts:["任意の節点において，流入する電流の和と流出する電流の和は等しい","任意の閉回路において，起電力の和と電圧降下の和は等しい","直列接続の合成抵抗は各抵抗の逆数の和の逆数で求められる","並列接続の場合，各抵抗に流れる電流は等しい"],ans:0,exp:"KCL（キルヒホッフの電流則）：任意の節点における電流の代数和はゼロ。流入電流の合計＝流出電流の合計。"},
  {ch:1,label:"第1章 電気回路",q:"キルヒホッフの電圧則（KVL）の説明として正しいのはどれか？",opts:["任意の閉回路において，起電力の和と電圧降下の和は等しい","任意の節点において，流入電流と流出電流は等しい","合成抵抗は各抵抗の積に等しい","電流は電圧に反比例する"],ans:0,exp:"KVL（キルヒホッフの電圧則）：任意の閉回路を一周すると，起電力の和＝電圧降下の和（電圧の代数和＝0）。"},
  {ch:1,label:"第1章 電気回路",q:"R1=10Ω，R2=6Ω，R3=2Ω，E1=25V，E2=8V の回路でKVL・KCLを立式するとき，最初に行うべき手順はどれか？",opts:["各抵抗に流れる電流の向きを仮定して図に書き込む","すぐに数値を代入して計算する","E1とE2を足して合計起電力を求める","抵抗を全て直列とみなして計算する"],ans:0,exp:"KVL・KCL法では，まず各抵抗に流れる電流の向きを自由に仮定して図に書き込むことが出発点。計算後に負になれば逆向きだとわかる。"},
  {ch:1,label:"第1章 電気回路",q:"2つの抵抗が並列接続されているとき，合成抵抗の値はどうなるか？",opts:["個々の抵抗値のどちらよりも小さくなる","個々の抵抗値の平均になる","個々の抵抗値を足した値になる","個々の抵抗値の積になる"],ans:0,exp:"並列合成抵抗 1/R = 1/R1 + 1/R2 より，Rは各抵抗値よりも必ず小さくなる。"},
  {ch:1,label:"第1章 電気回路",q:"R1=10kΩ（直列）とR2=20kΩ，R3=30kΩの並列の組み合わせ回路において，合成抵抗 Rab の正しい計算手順はどれか？",opts:["まずR2とR3の並列合成を求め，その後R1と直列合成する","R1・R2・R3を全て加算する","R1とR2を並列にした後，R3と直列にする","3つ全て並列として計算する"],ans:0,exp:"並列部分(R2‖R3)を先に計算：1/(1/20k+1/30k)=12kΩ，次にR1=10kと直列加算→合成22kΩ。"},
  {ch:2,label:"第2章 原子・結合",q:"パウリの排他律の説明として正しいのはどれか？",opts:["同一の量子状態に2つ以上の電子が存在することはできない","電子は必ず対を作って存在する","電子はエネルギーの高い軌道から順に埋まっていく","2つの電子は常に同じスピンを持つ"],ans:0,exp:"パウリの排他律：1つの量子状態（エネルギー・スピン等で定まる）には電子が1つしか入れない。これによりエネルギーバンド構造が生まれる。"},
  {ch:2,label:"第2章 原子・結合",q:"水素分子（H₂）が形成される理由として最も適切なのはどれか？",opts:["2つの水素原子が電子を共有することでエネルギー的に安定になるから","水素原子は単体では存在できないから","水素原子同士がイオン結合するから","水素原子はK殻が空であるから"],ans:0,exp:"H₂は共有結合。2つのH原子が電子を共有する結合軌道を形成し，単体の原子よりエネルギーが低い安定状態になるため分子として存在する。"},
  {ch:2,label:"第2章 原子・結合",q:"Siの結晶構造として正しいのはどれか？",opts:["ダイヤモンド構造","面心立方構造","体心立方構造","岩塩構造"],ans:0,exp:"Siは共有結合性の結晶。正四面体の中心と各頂点に原子が配列するダイヤモンド構造をとる。各Si原子は4個の隣接Si原子と共有結合する。"},
  {ch:2,label:"第2章 原子・結合",q:"Siのバンドギャップのエネルギーとして正しい値はどれか？",opts:["約1.12 eV","約0.03 eV","約5.5 eV","約0.67 eV"],ans:0,exp:"Siのバンドギャップは約1.12 eV（室温）。0.03 eVはドナー・アクセプタ準位の深さ，5.5 eVはダイヤモンド（絶縁体），0.67 eVはGe。"},
  {ch:2,label:"第2章 原子・結合",q:"室温27℃の熱エネルギー Et=kT の概算値として最も近いのはどれか？",opts:["約0.026 eV","約0.26 eV","約2.6 eV","約0.0026 eV"],ans:0,exp:"T=300K，k=1.381×10⁻²³ J/K → Et=kT=4.14×10⁻²¹ J ÷ 1.602×10⁻¹⁹ C ≈ 0.026 eV。"},
  {ch:2,label:"第2章 原子・結合",q:"波長550nmの可視光のエネルギーとして最も近いのはどれか？",opts:["約2.25 eV","約0.55 eV","約5.5 eV","約22.5 eV"],ans:0,exp:"E=hc/λ，h=6.626×10⁻³⁴，c=3×10⁸，λ=550×10⁻⁹ → E=3.61×10⁻¹⁹ J ÷ 1.602×10⁻¹⁹ ≈ 2.25 eV。"},
  {ch:2,label:"第2章 原子・結合",q:"Siの価電子帯上端の電子が2.0 eVのエネルギーを吸収するとどうなるか？",opts:["伝導帯に励起され，自由電子として動ける","価電子帯内で別の準位に移動する","原子から飛び出して真空中に放出される","何も変化しない"],ans:0,exp:"Siのバンドギャップは1.12 eV。2.0 eV > 1.12 eV なので，電子はバンドギャップを超えて伝導帯に励起され，自由電子（伝導電子）として動ける。"},
  {ch:2,label:"第2章 原子・結合",q:"Siの価電子帯上端の電子が0.5 eVのエネルギーを吸収するとどうなるか？",opts:["バンドギャップを超えられず，伝導帯には移れない","すぐに伝導帯に励起される","原子から飛び出す","ホールが生成される"],ans:0,exp:"0.5 eV < Siのバンドギャップ1.12 eV。エネルギーが不足しているため電子は伝導帯に移ることができない（禁制帯は通過できない）。"},
  {ch:3,label:"第3章 不純物半導体",q:"真性半導体の説明として正しいのはどれか？",opts:["不純物を含まない純粋な半導体で，電子とホールが等数存在する","ドナーを多く含む半導体","アクセプタを多く含む半導体","金属と絶縁体の中間の電気抵抗をもつすべての物質"],ans:0,exp:"真性半導体：不純物を含まない純粋な半導体。熱励起によって電子とホールが対生成されるため，n = p = ni（真性キャリア密度）となる。"},
  {ch:3,label:"第3章 不純物半導体",q:"n形半導体を作るためにSiに添加する元素として正しいのはどれか？",opts:["P（リン）などのV族元素","B（ホウ素）などのIII族元素","Na（ナトリウム）などのI族元素","Cl（塩素）などのVII族元素"],ans:0,exp:"V族元素（P，As，Sb）は価電子5個。Siの共有結合（4個使用）に参加した後，余った1個の電子がドナー準位から容易に伝導帯に励起→n形半導体。"},
  {ch:3,label:"第3章 不純物半導体",q:"p形半導体の多数キャリアはどれか？",opts:["ホール（正孔）","伝導電子","ドナーイオン","中性原子"],ans:0,exp:"p形半導体：III族元素（B等）添加。価電子が1個足りないためアクセプタ準位が生じ，価電子帯からの電子を受け入れてホールを多数生成→ホールが多数キャリア。"},
  {ch:3,label:"第3章 不純物半導体",q:"n形半導体の少数キャリアはどれか？",opts:["ホール（正孔）","伝導電子","ドナーイオン","アクセプタイオン"],ans:0,exp:"n形半導体の多数キャリアは伝導電子。ホールは価電子帯からの熱励起によって少数生成されるだけで，少数キャリアとなる。"},
  {ch:3,label:"第3章 不純物半導体",q:"ドナー準位が伝導帯のすぐ下（約0.03 eV）に位置することのメリットはどれか？",opts:["室温の熱エネルギー（~0.026 eV）だけでドナー電子を伝導帯に励起できる","絶対零度でもキャリアが存在する","バンドギャップが小さくなる","ホールの数が増える"],ans:0,exp:"室温の熱エネルギーkT≈0.026 eVと，ドナー準位の深さ~0.03 eVがほぼ同程度。そのため室温でほぼ全ドナーがイオン化し，多数の伝導電子が生じる。"},
  {ch:3,label:"第3章 不純物半導体",q:"Siの真性半導体で価電子帯の電子を伝導帯に励起するのに必要な最低エネルギーはいくらか？",opts:["1.12 eV","0.03 eV","0.05 eV","2.25 eV"],ans:0,exp:"Siのバンドギャップ EG = 1.12 eV。これが価電子帯→伝導帯の励起に必要な最低エネルギー。0.03 eVはドナー深さ，0.05 eVはアクセプタ深さ。"},
  {ch:3,label:"第3章 不純物半導体",q:"以下の記述のうち誤っているのはどれか？",opts:["SiにV族元素を添加したものをp形半導体という","n形半導体の少数キャリアはホールである","半導体の電気伝導度は温度が下がると小さくなる","真性半導体では電子とホールの数は等しい"],ans:0,exp:"V族元素（P等）を添加するとn形半導体（多数キャリアは電子）になる。p形はIII族元素（B等）を添加したもの。"},
  {ch:4,label:"第4章 キャリア密度",q:"状態密度 dn(E) の物理的な意味として最も正しいのはどれか？",opts:["各エネルギーにおいてキャリアが入ることができる量子状態（座席）の数","各エネルギーにおいてキャリアが実際に存在する確率","伝導帯全体の電子の総数","フェルミ準位付近の電子密度"],ans:0,exp:"状態密度：各エネルギー準位において電子が入れる「座席数（量子状態数）」の密度。コンサートの「座席数」に相当。実際に入っているかはFD分布関数で決まる。"},
  {ch:4,label:"第4章 キャリア密度",q:"フェルミ・ディラック（FD）分布関数 f(E) の説明として正しいのはどれか？",opts:["エネルギーEの状態が電子に占有される確率を表す","エネルギーEにある電子の実際の数を表す","状態密度とFD分布関数の積がキャリア密度になる（前半は正しい表現）","温度が上がるとEF近傍で関数が急峻になる"],ans:0,exp:"FD分布関数 f(E) = 1/[1+exp((E-EF)/kT)]：エネルギーEの量子状態が電子に占有される確率。E=EFで必ずf=0.5。コンサートの「客の懐具合（確率）」に相当。"},
  {ch:4,label:"第4章 キャリア密度",q:"E − EF ≫ kT の条件でFD分布関数をMB（マクスウェル・ボルツマン）分布に近似すると？",opts:["f(E) ≈ exp((EF−E)/kT)","f(E) ≈ exp((E−EF)/kT)","f(E) ≈ 1","f(E) ≈ 0"],ans:0,exp:"E−EF ≫ kT のとき exp((E−EF)/kT) ≫ 1 なので分母の1を無視でき，f≈exp(−(E−EF)/kT)=exp((EF−E)/kT)。これがMB近似（ボルツマン近似）。"},
  {ch:4,label:"第4章 キャリア密度",q:"T=300K，E=EF+0.03eV のときのFD分布関数の値として最も近いのはどれか？（k=1.381×10⁻²³ J/K）",opts:["約0.31","約0.50","約0.69","約0.95"],ans:0,exp:"kT=0.0259 eV，(E-EF)/kT = 0.03/0.0259≈1.158。f=1/(1+e^1.158)=1/(1+3.18)≈0.239≒約0.31に近い値。"},
  {ch:4,label:"第4章 キャリア密度",q:"伝導電子の状態密度 dn(E) の式において，√(E−EC) の部分が示すことは？",opts:["伝導帯底 EC からエネルギーが高くなるほど状態密度が増加する","EC 付近で状態密度が最大になる","すべてのエネルギーで状態密度は一定","EF付近だけ状態密度が大きい"],ans:0,exp:"dn(E) ∝ √(E−EC)：伝導帯底ECからエネルギーが増加するにつれ，入れる量子状態（座席）の数が√関数的に増加する。これは運動量空間の体積の増加に対応。"},
  {ch:4,label:"第4章 キャリア密度",q:"キャリア密度（伝導電子密度 n）を表す式として正しいのはどれか？",opts:["n = ∫(EC~∞) dn(E)·f(E) dE","n = dn(E)·f(E)","n = NC·exp((EC−EF)/kT)","n = NV·exp(−(EF−EV)/kT)"],ans:0,exp:"キャリア密度＝状態密度×占有確率を全エネルギーにわたって積分。n=∫dn(E)·f(E)dE。MB近似を使うとn=NC·exp(−(EC−EF)/kT) と簡略化できる。"},
  {ch:4,label:"第4章 キャリア密度",q:"Pドープのn形半導体でドナー電子を伝導帯に励起するのに必要なエネルギーは約何eVか？",opts:["約0.03 eV","約1.12 eV","約0.05 eV","約2.25 eV"],ans:0,exp:"P（リン）のドナー準位は伝導帯直下約0.03 eVに位置する。室温の熱エネルギー~0.026 eVでほぼイオン化でき，これがn形半導体の動作原理。"},
  {ch:4,label:"第4章 キャリア密度",q:"Bドープのp形半導体でアクセプタ準位への励起に必要なエネルギーは約何eVか？",opts:["約0.05 eV","約1.12 eV","約0.03 eV","約0.5 eV"],ans:0,exp:"B（ホウ素）のアクセプタ準位は価電子帯直上約0.05 eV。Pドナーの0.03 eVより少し深いが，やはり室温で容易にイオン化する。"},
  {ch:5,label:"第5章 フェルミ準位",q:"真性半導体において n = p となる物理的な理由は何か？",opts:["価電子帯から電子が励起されるとき，必ず同数のホールが生成されるから","ドナーとアクセプタが等量含まれるから","NC = NV だから","フェルミ準位がバンドギャップの中央にあるから"],ans:0,exp:"真性半導体では熱励起で電子とホールが対生成（電子1個↑ → ホール1個生成）。外部からキャリアを加えない限り，電子とホールは必ず等数 n=p=ni。"},
  {ch:5,label:"第5章 フェルミ準位",q:"pn積（n × p）を表す式として正しいのはどれか？",opts:["pn = NC·NV·exp(−EG/kT)","pn = ni²","pn = ND·NA","pn = NC·exp(−EC/kT)"],ans:0,exp:"p×n = NV·exp(−(EF−EV)/kT) × NC·exp(−(EC−EF)/kT) = NC·NV·exp(−EG/kT)。EFが消え，温度とバンドギャップだけで決まる。ni²とも書ける。"},
  {ch:5,label:"第5章 フェルミ準位",q:"フェルミ準位 EF を「キャリアにとってどのような場所」と直感的に言えるか？",opts:["電子が50%の確率で占有している（いる確率＝いない確率）エネルギー準位","電子が最も多く存在するエネルギー準位","電子が絶対に存在できないエネルギー準位","電子が0%の確率で占有しているエネルギー準位"],ans:0,exp:"FD分布関数でE=EFのとき f(EF)=1/(1+e⁰)=0.5。つまりEFは電子が50%の確率で占有するエネルギー準位。「あるかないか五分五分の境界線」。"},

  {ch:6,label:"第6章 温度依存性",q:"外因性半導体のキャリア密度の温度依存性グラフ（log n vs 1/T）において，中温（飽和）領域の特徴はどれか？",opts:["キャリア密度がほぼ一定で ND（またはNA）に等しい","1/Tに比例して増加する","温度に無関係に非常に大きい","指数関数的に急増する"],ans:0,exp:"中温（飽和）領域：全ドナーがイオン化，かつ真性励起は無視できる。よってn≈ND=一定。グラフで水平（プラトー）になる領域。"},
  {ch:6,label:"第6章 温度依存性",q:"低温領域（ドーパント領域）における n型半導体の伝導電子密度として正しいのはどれか？",opts:["n ≈ ND+（イオン化したドナー密度 ≪ ND）","n ≈ ND","n ≈ ni（真性キャリア密度）","n ≈ 0"],ans:0,exp:"低温領域：kTが小さくドナーはほとんどイオン化しない（ND+ ≪ ND）。真性励起もほぼゼロ。n = ND+ + n' ≈ ND+。グラフで右側（低温）で急減する。"},

  {ch:6,label:"第6章 温度依存性",q:"外因性半導体のフェルミ準位の温度依存性について，n型半導体の場合どうなるか？",opts:["低温ではECに近く，温度上昇とともに真性フェルミ準位EFiに近づく","低温ではEVに近く，温度上昇とともにECに近づく","温度によらず一定","低温ではEFiに近い"],ans:0,exp:"n型のEF：低温ではEF≈EDに近く，中温ではEC+kT·ln(ND/NC)（ECより下），高温になるとni増加でn型の特性が薄れ，EFはEFiに収束していく。"},

];

let questions = [...ALL_QUESTIONS];
let current = 0;
let score = 0;
let answered = false;
let selectedFilter = 0;
let shuffleMode = false;
let chapterScores = {};
for(let i=1;i<=6;i++) chapterScores[i]={correct:0,total:0};

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function getFilteredQuestions(){
  if(selectedFilter===0) return [...ALL_QUESTIONS];
  return ALL_QUESTIONS.filter(q=>q.ch===selectedFilter);
}

function startQuiz(){
  questions = getFilteredQuestions();
  if(shuffleMode) shuffle(questions);
  current = 0;
  score = 0;
  answered = false;
  for(let i=1;i<=6;i++) chapterScores[i]={correct:0,total:0};
  render();
}

function render(){
  const app = document.getElementById('app');
  if(current >= questions.length){
    renderResult(app); return;
  }
  const q = questions[current];
  const total = questions.length;
  const pct = Math.round((current/total)*100);

  let opts = q.opts.map((o,i)=>`<button class="opt-btn" onclick="answer(${i})" id="opt${i}">${String.fromCharCode(65+i)}. ${o}</button>`).join('');

  app.innerHTML = `
    <div class="filter-bar">
      ${[0,1,2,3,4,5,6].map(i=>`<button class="filter-btn ${selectedFilter===i?'active':''}" onclick="setFilter(${i})">${i===0?'全章':'第'+i+'章'}</button>`).join('')}
    </div>
    <div class="shuffle-row">
      <label><input type="checkbox" id="shuf" ${shuffleMode?'checked':''} onchange="toggleShuffle()"> 問題をシャッフル</label>
      <button class="btn" onclick="startQuiz()" style="margin-left:auto;font-size:12px;padding:3px 10px">最初から</button>
    </div>
    <div class="stats">
      <div class="stat-card"><div class="stat-label">問題</div><div class="stat-val">${current+1}<span style="font-size:14px;color:var(--color-text-secondary)">/${total}</span></div></div>
      <div class="stat-card"><div class="stat-label">正解</div><div class="stat-val" style="color:#639922">${score}</div></div>
      <div class="stat-card"><div class="stat-label">正答率</div><div class="stat-val">${current>0?Math.round(score/current*100):0}<span style="font-size:14px">%</span></div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-card">
      <div class="q-meta"><span class="chapter-badge">${q.label}</span> &nbsp; Q${current+1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${opts}</div>
      <div id="feedback"></div>
    </div>
    <div class="nav">
      <span class="counter">${current+1} / ${total}</span>
      <button class="btn btn-primary" id="nextBtn" onclick="next()" style="display:none">次の問題 →</button>
    </div>
  `;
}

function answer(i){
  if(answered) return;
  answered = true;
  const q = questions[current];
  const correct = i === q.ans;
  if(correct){
    score++;
    chapterScores[q.ch].correct++;
  }
  chapterScores[q.ch].total++;

  for(let j=0;j<q.opts.length;j++){
    const btn = document.getElementById('opt'+j);
    btn.disabled = true;
    if(j===q.ans) btn.classList.add(correct && j===i ? 'correct' : 'reveal');
    else if(j===i && !correct) btn.classList.add('wrong');
  }

  const fb = document.getElementById('feedback');
  fb.innerHTML = `<div class="feedback ${correct?'ok':'ng'}"><strong>${correct?'✓ 正解！':'✗ 不正解'}</strong><br>${q.exp}</div>`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next(){
  current++;
  answered = false;
  render();
}

function setFilter(ch){
  selectedFilter = ch;
  startQuiz();
}

function toggleShuffle(){
  shuffleMode = document.getElementById('shuf').checked;
  startQuiz();
}

function renderResult(app){
  const total = questions.length;
  const pct = Math.round(score/total*100);
  let msg = pct>=90?'🎉 優秀！全章を完全に理解できています':pct>=70?'👍 よくできました！苦手章を重点復習しましょう':pct>=50?'📝 基礎はOK。各章の公式を再確認しましょう':'📖 各章の基本概念から丁寧に復習しましょう';

  let chRows = '';
  for(let i=1;i<=6;i++){
    const titles=['','電気回路','原子・結合','不純物半導体','キャリア密度','フェルミ準位','温度依存性'];
    const s = chapterScores[i];
    if(s.total===0) continue;
    const p = Math.round(s.correct/s.total*100);
    const col = p>=80?'#639922':p>=60?'#BA7517':'#A32D2D';
    chRows += `<div class="stat-card"><div class="stat-label">第${i}章 ${titles[i]}</div><div class="stat-val" style="color:${col};font-size:18px">${s.correct}/${s.total}<span style="font-size:12px;margin-left:4px">${p}%</span></div></div>`;
  }

  app.innerHTML = `
    <div class="result-wrap">
      <div style="font-size:14px;color:var(--color-text-secondary);margin-bottom:.5rem">最終スコア</div>
      <div class="result-score" style="color:${pct>=70?'#639922':pct>=50?'#BA7517':'#A32D2D'}">${score}<span style="font-size:24px;color:var(--color-text-secondary)">/${total}</span></div>
      <div style="font-size:28px;font-weight:500;margin-bottom:.5rem">${pct}%</div>
      <div class="result-label">${msg}</div>
      <div class="result-grid">${chRows}</div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="startQuiz()">もう一度挑戦</button>
        <button class="btn" onclick="setFilter(0)">全章で挑戦</button>
      </div>
    </div>
  `;
}

startQuiz();
</script>
